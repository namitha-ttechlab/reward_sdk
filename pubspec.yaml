name: reward_sdk
description: "A premium Flutter SDK for implementing reward and loyalty features with beautiful, ready-to-use widgets like scratch cards, banners, and bottom sheets."
version: 0.0.1
homepage: https://github.com/namitha-ttechlab/reward_sdk
repository: https://github.com/namitha-ttechlab/reward_sdk
issue_tracker: https://github.com/namitha-ttechlab/reward_sdk/issues

environment:
  sdk: ^3.9.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.4
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

